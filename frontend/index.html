<!DOCTYPE html>
<html>
<head>
  <title>BFHL</title>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; }
    textarea { width: 100%; height: 100px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 14px; }
    button { margin-top: 12px; background: #6366f1; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; }
    pre { background: #1e293b; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; font-size: 13px; }
    .error { color: #fca5a5; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>BFHL Tree Explorer</h2>
  <textarea id="inp" placeholder="A->B, A->C, B->D, X->Y, Y->Z, Z->X"></textarea>
  <br>
  <button id="btn">Submit</button>
  <div id="err" class="error"></div>
  <pre id="out"></pre>

  <script>
    document.getElementById('btn').addEventListener('click', async function() {
      const raw = document.getElementById('inp').value.trim();
      if (!raw) return;
      document.getElementById('err').textContent = '';
      document.getElementById('out').textContent = 'Loading...';
      const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
      try {
        const res = await fetch('http://127.0.0.1:3000/bfhl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data })
        });
        const json = await res.json();
        document.getElementById('out').textContent = JSON.stringify(json, null, 2);
      } catch(e) {
        document.getElementById('err').textContent = 'Error: ' + e.message;
        document.getElementById('out').textContent = '';
      }
    });
  </script>
</body>
</html>
